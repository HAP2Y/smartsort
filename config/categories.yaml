  AstroQuant_Sidereal:
    extensions: [.csv, .xlsx, .json, .py, .ipynb, .txt, .tar.gz]
    keywords: [astro, quant, backtest, trading, stocks, nifty, banknifty, ephemeris, planet, sidereal, strategy, ohlc, signals, candles, market, finance]
  
  Guidewire_PSE_Work:
    extensions: [.txt, .log, .xml, .json, .csv, .pdf, .docx, .pptx]

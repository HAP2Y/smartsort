name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q classifier movers main.py

      - name: Run pytest
        run: python -m pytest -q --color=no

  dryrun-smoke:
    name: CLI dry-run smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build a fixture directory of representative filenames
        run: |
          mkdir -p /tmp/smartsort-fixture
          cd /tmp/smartsort-fixture
          touch \
            "Happy_imm5476e_Signed.pdf" \
            "Patel_Happy_2022-2023_T4.pdf" \
            "Canada_Happy Patel_Employment Verification Letter.pdf" \
            "PR_GWRE_Experience_Letter.pdf" \
            "PATEL_CAN_PAY_SLIP_JUN_2025.pdf" \
            "Patel_Happy_HDFC_BalanceCertificate_269.pdf" \
            "Happy_Doctors_Follow_up_Letter.pdf" \
            "xlre.csv" \
            "Reality_Flip_Complete.html" \
            "Air India Web Booking eTicket - HAPPY.pdf" \
            "HAPPY PATEL - Resume.pdf" \
            "IMG-20260125-WA0002.jpg" \
            "Ollama.dmg"
          ls -la

      - name: Run CLI in dry-run (no AI)
        env:
          NO_COLOR: "1"
          TERM: dumb
        run: |
          python main.py run /tmp/smartsort-fixture --no-ai | tee dryrun_output.txt

      - name: Assert each expected category appears in the plan
        run: |
          set -e
          for cat in \
            Canadian_PR_Docs \
            Financial_Taxes \
            Medical_Health \
            AstroQuant_Sidereal \
            Franchise_Business_Research \
            Travel_Transit \
            Resumes_Career_Tech \
            Media_Images \
            Archives_and_Apps; do
            if ! grep -q "$cat" dryrun_output.txt; then
              echo "::error::Expected category '$cat' not found in dry-run output"
              exit 1
            fi
          done
          echo "All expected categories present."

      - name: Assert dry-run did not move files
        run: |
          set -e
          for f in \
            "Happy_imm5476e_Signed.pdf" \
            "xlre.csv" \
            "Ollama.dmg"; do
            if [ ! -f "/tmp/smartsort-fixture/$f" ]; then
              echo "::error::Dry-run moved $f (it should not have)"
              exit 1
            fi
          done
          if [ -f "/tmp/smartsort-fixture/.smartsort_undo.json" ]; then
            echo "::error::Dry-run wrote an undo log"
            exit 1
          fi

      - name: Upload dry-run output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dryrun-output
          path: dryrun_output.txt

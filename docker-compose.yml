# Local development stack for the distributed inference runtime.
#
# Architecture: AI is the primary classifier. Rules / OCR don't have
# dedicated worker containers any more — rules run as a fallback INSIDE
# the AI worker pipeline (when the LLM declines), and OCR-routed files
# (images) are flagged Unknown on the dispatcher until a real OCR
# classifier ships.
#
# Resource budget (full fleet, default scale):
#   redis              ~30 MB   (capped at 128 MB)
#   ai-small-worker(2) ~150 MB each (capped at 768 MB)
#   ai-large-worker(1) ~150 MB    (capped at 768 MB)
# Total inside Docker: ~500 MB. Ollama on the host adds the model size
# (qwen2.5:7b ≈ 5 GB, qwen2.5:14b ≈ 9 GB).
#
# Usage:
#   docker-compose up --build           # start redis + AI workers
#   docker-compose up --scale ai-small-worker=2

x-worker-base: &worker-base
  depends_on:
    redis:
      condition: service_healthy
  volumes:
    - ./workdir:/work
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    mem_limit: 128m

  ai-small-worker:
    <<: *worker-base
    build:
      context: .
      dockerfile: Dockerfile.ai
    mem_limit: 768m
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    command:
      - serve-worker
      - --routes
      - ai-small
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  ai-large-worker:
    <<: *worker-base
    build:
      context: .
      dockerfile: Dockerfile.ai
    mem_limit: 768m
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    command:
      - serve-worker
      - --routes
      - ai-large
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  # On-demand CLI for running `smartsort run ...` inside the compose
  # network. Triggered only by `docker-compose run --rm cli ...`.
  cli:
    <<: *worker-base
    build:
      context: .
      dockerfile: Dockerfile.ai
    profiles: ["cli"]
    entrypoint: ["python", "main.py"]

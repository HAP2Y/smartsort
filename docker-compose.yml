# Local development stack for the distributed inference runtime.
#
# Resource budget (full fleet, default scale):
#   redis              ~30 MB
#   rules-worker (1)   ~80 MB   (slim image, no PyMuPDF/docx)
#   ai-small-worker(2) ~150 MB each
#   ai-large-worker(1) ~150 MB
# Total inside Docker: ~600 MB. Ollama on the host adds the model size
# (qwen2.5:14b = ~9 GB, qwen2.5:32b = ~20 GB). Use `large_model` carefully.
#
# Usage:
#   docker-compose up --build              # start redis + one worker per route
#   docker-compose up --scale ai-small-worker=2   # cap to avoid Ollama queue thrash

x-worker-base: &worker-base
  depends_on:
    redis:
      condition: service_healthy
  volumes:
    - ./workdir:/work
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    mem_limit: 128m

  # Cheap worker on the slim image: drains the rules queue AND the OCR
  # queue (OCR currently falls back to rules until a real OCR classifier
  # ships). One process, two routes — same slim image.
  rules-worker:
    <<: *worker-base
    build:
      context: .
      dockerfile: Dockerfile
    mem_limit: 256m
    command:
      - serve-worker
      - --routes
      - rules,ocr
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  ai-small-worker:
    <<: *worker-base
    build:
      context: .
      dockerfile: Dockerfile.ai
    mem_limit: 768m
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    command:
      - serve-worker
      - --routes
      - ai-small
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  ai-large-worker:
    <<: *worker-base
    build:
      context: .
      dockerfile: Dockerfile.ai
    mem_limit: 768m
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    command:
      - serve-worker
      - --routes
      - ai-large
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  # On-demand CLI for running `smartsort run ...` inside the compose
  # network. Triggered only by `docker-compose run --rm cli ...`.
  cli:
    <<: *worker-base
    build:
      context: .
      dockerfile: Dockerfile.ai
    profiles: ["cli"]
    entrypoint: ["python", "main.py"]

# Local development stack for the distributed inference runtime.
#
# Usage:
#   docker compose up --build              # start redis + one worker per route
#   docker compose up --scale ai-small-worker=4   # scale a route horizontally
#
# To submit work from your host machine (workers stay running here):
#   smartsort run ./workdir --distributed --backend redis --redis-url redis://localhost:6379/0
#
# Or run the dispatcher inside the network:
#   docker compose run --rm cli run /work --distributed --backend redis \
#                                  --redis-url redis://redis:6379/0
#
# Linux note: AI workers reach Ollama via host.docker.internal. The
# `extra_hosts: host-gateway` entries make this work the same way on Linux
# as it already does on Docker Desktop (Mac / Windows).

x-worker-base: &worker-base
  build: .
  depends_on:
    redis:
      condition: service_healthy
  volumes:
    - ./workdir:/work
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  # Cheap worker: drains the rules queue AND the OCR queue (which currently
  # falls back to rules until a real OCR classifier lands). One process,
  # two routes — same image as everyone else.
  rules-worker:
    <<: *worker-base
    command:
      - serve-worker
      - --routes
      - rules,ocr
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  ai-small-worker:
    <<: *worker-base
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    command:
      - serve-worker
      - --routes
      - ai-small
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  ai-large-worker:
    <<: *worker-base
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    command:
      - serve-worker
      - --routes
      - ai-large
      - --backend
      - redis
      - --redis-url
      - redis://redis:6379/0
      - -v

  # On-demand CLI for running `smartsort run ...` inside the compose network.
  # Started only via `docker compose run --rm cli ...`, never on `up`.
  cli:
    <<: *worker-base
    profiles: ["cli"]
    entrypoint: ["python", "main.py"]
